<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tax Calculator</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f4f7fb;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .calculator {
      background: #fff;
      width: 100%;
      max-width: 450px;
      padding: 25px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    .calculator h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #222;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 7px;
      font-weight: 600;
      color: #333;
    }

    input, select {
      width: 100%;
      padding: 12px;
      border: 1px solid #dcdcdc;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
    }

    input:focus, select:focus {
      border-color: #4a90e2;
    }

    .btn {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 10px;
      background: #4a90e2;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: #357abd;
    }

    .results {
      margin-top: 20px;
      background: #f9fbff;
      border: 1px solid #e6eefc;
      border-radius: 12px;
      padding: 18px;
    }

    .result-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
      font-size: 15px;
      color: #333;
    }

    .result-item:last-child {
      margin-bottom: 0;
      font-weight: bold;
      color: #111;
      border-top: 1px solid #ddd;
      padding-top: 12px;
      margin-top: 12px;
    }

    .note {
      margin-top: 14px;
      font-size: 13px;
      color: #666;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="calculator">
    <h2>Tax Calculator</h2>

    <div class="form-group">
      <label for="amount">Amount</label>
      <input type="number" id="amount" placeholder="Enter amount" min="0" step="0.01" />
    </div>

    <div class="form-group">
      <label for="taxRate">Tax Rate (%)</label>
      <input type="number" id="taxRate" placeholder="Enter tax rate" min="0" step="0.01" />
    </div>

    <div class="form-group">
      <label for="taxType">Tax Type</label>
      <select id="taxType">
        <option value="exclusive">Tax Exclusive</option>
        <option value="inclusive">Tax Inclusive</option>
      </select>
    </div>

    <button class="btn" onclick="calculateTax()">Calculate</button>

    <div class="results" id="results">
      <div class="result-item">
        <span>Base Amount</span>
        <span id="baseAmount">0.00</span>
      </div>
      <div class="result-item">
        <span>Tax Amount</span>
        <span id="taxAmount">0.00</span>
      </div>
      <div class="result-item">
        <span>Total Amount</span>
        <span id="totalAmount">0.00</span>
      </div>
    </div>

    <div class="note">
      Use this calculator for GST, VAT, sales tax, or general tax calculation.
    </div>
  </div>

  <script>
    function calculateTax() {
      const amount = parseFloat(document.getElementById("amount").value) || 0;
      const taxRate = parseFloat(document.getElementById("taxRate").value) || 0;
      const taxType = document.getElementById("taxType").value;

      let baseAmount = 0;
      let taxAmount = 0;
      let totalAmount = 0;

      if (taxType === "exclusive") {
        baseAmount = amount;
        taxAmount = (amount * taxRate) / 100;
        totalAmount = baseAmount + taxAmount;
      } else {
        totalAmount = amount;
        baseAmount = amount / (1 + taxRate / 100);
        taxAmount = totalAmount - baseAmount;
      }

      document.getElementById("baseAmount").textContent = baseAmount.toFixed(2);
      document.getElementById("taxAmount").textContent = taxAmount.toFixed(2);
      document.getElementById("totalAmount").textContent = totalAmount.toFixed(2);
    }
  </script>
</body>
</html>
