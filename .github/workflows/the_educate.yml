name: Deploy Website

on:
  push:
    branches:
      - "*"

env:
    IMAGE_NAME: kubernetes-ci-cd-pipeline-main
    DOCKER_TAG: latest

jobs:
    deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v3

    - name: Deploy to EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ec2-user
        key: ${{ secrets.EC2_KEY }}
        script: |
          cd /${{github.repository}}
          echo "===== CLEAN SYNC CODE ====="
          git fetch --all
          git reset --hard origin/main
          echo "===== FIX PERMISSIONS (SAFE) ====="
          sudo chown -R ec2-user:ec2-user .
          docker build -t ${{github.repository}} .
          docker run -d -p 80:80 --name ${{github.repository}} ${{github.repository}}
          echo "###########################################"
          docker ps
          echo "###########################################"
          docker ps -a
          echo "###########################################"          
