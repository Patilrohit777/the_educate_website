name: Deploy Website

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show branch
        run: echo "Running on ${{ github.ref }}"

  deploy:
    runs-on: ubuntu-latest
    needs: build-check

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ github.ref == 'refs/heads/main' && secrets.EC2_HOST || secrets.EC2_HOST_TEST }}
          username: ec2-user
          key: ${{ github.ref == 'refs/heads/main' && secrets.EC2_KEY || secrets.EC2_KEY_TEST }}
          script: |
            cd /home/ec2-user/${{ github.event.repository.name }}

            echo "===== CLEAN SYNC CODE ====="
            git fetch --all
            git reset --hard origin/${{ github.ref_name }}

            echo "===== FIX PERMISSIONS ====="
            sudo chown -R ec2-user:ec2-user .

            echo "===== STOP OLD CONTAINER ====="
            docker rm -f ${{ github.event.repository.name }} || true

            echo "===== BUILD IMAGE ====="
            docker build -t ${{ github.event.repository.name }} .

            echo "===== RUN CONTAINER ====="
            docker run -d -p 80:80 \
              --name ${{ github.event.repository.name }} \
              ${{ github.event.repository.name }}

            echo "===== RUNNING CONTAINERS ====="
            docker ps

            echo "===== ALL CONTAINERS ====="
            docker ps -a
