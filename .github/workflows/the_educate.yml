name: Deploy Website

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Show branch
        run: echo "Running on ${{ github.ref }}"

  deploy:
    runs-on: ubuntu-latest
    needs: build-check
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2 (main branch)
        if: github.ref == 'refs/heads/main'
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            echo "===== INSTANCE DETAILS ====="
            hostname -f
            uname -a
            echo "Public IP: $(curl -s http://169.254.169.254/latest/meta-data/public-ipv4)"
            echo "Instance ID: $(curl -s http://169.254.169.254/latest/meta-data/instance-id)"
            echo "Availability Zone: $(curl -s http://169.254.169.254/latest/meta-data/placement/availability-zone)"

            echo "===== CHECK DIRECTORY ====="
            ls -l /home/ec2-user

            # Ensure repo exists
            if [ ! -d "/home/ec2-user/${{ github.event.repository.name }}" ]; then
              echo "Cloning repository..."
              git clone https://github.com/${{ github.repository }} /home/ec2-user/${{ github.event.repository.name }}
            fi

            cd /home/ec2-user/${{ github.event.repository.name }}

            echo "===== FIX PERMISSIONS ====="
            sudo chown -R ec2-user:ec2-user .

            echo "===== SYNC CODE ====="
            git fetch --all
            git reset --hard origin/${{ github.ref_name }}

            echo "===== STOP OLD CONTAINER ====="
            docker rm -f ${{ github.event.repository.name }} || true

            echo "===== BUILD IMAGE ====="
            if [ -f Dockerfile ]; then
              docker build -t ${{ github.event.repository.name }} .
            else
              echo "No Dockerfile found, skipping build"
            fi

            echo "===== RUN CONTAINER ====="
            docker run -d -p 80:80 --name ${{ github.event.repository.name }} ${{ github.event.repository.name }} || echo "Run failed"

            echo "===== RUNNING CONTAINERS ====="
            docker ps -a

      - name: Deploy to EC2 (non-main branches)
        if: github.ref != 'refs/heads/main'
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST_TEST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY_TEST }}
          script: |
            echo "===== INSTANCE DETAILS ====="
            hostname -f
            uname -a
            echo "Public IP: $(curl -s http://169.254.169.254/latest/meta-data/public-ipv4)"
            echo "Instance ID: $(curl -s http://169.254.169.254/latest/meta-data/instance-id)"
            echo "Availability Zone: $(curl -s http://169.254.169.254/latest/meta-data/placement/availability-zone)"

            echo "===== CHECK DIRECTORY ====="
            ls -l /home/ec2-user

            # Ensure repo exists
            if [ ! -d "/home/ec2-user/${{ github.event.repository.name }}" ]; then
              echo "Cloning repository..."
              git clone https://github.com/${{ github.repository }} /home/ec2-user/${{ github.event.repository.name }}
            fi

            cd /home/ec2-user/${{ github.event.repository.name }}

            echo "===== FIX PERMISSIONS ====="
            sudo chown -R ec2-user:ec2-user .

            echo "===== SYNC CODE ====="
            git fetch --all
            git reset --hard origin/${{ github.ref_name }}

            echo "===== STOP OLD CONTAINER ====="
            docker rm -f ${{ github.event.repository.name }} || true

            echo "===== BUILD IMAGE ====="
            if [ -f Dockerfile ]; then
              docker build -t ${{ github.event.repository.name }} .
            else
              echo "No Dockerfile found, skipping build"
            fi

            echo "===== RUN CONTAINER ====="
            docker run -d -p 8080:80 --name ${{ github.event.repository.name }} ${{ github.event.repository.name }} || echo "Run failed"

            echo "===== RUNNING CONTAINERS ====="
            docker ps -a
