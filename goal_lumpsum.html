<h1>Goal Planning - Lumpsum</h1>

<input id="goal" placeholder="Target Amount"><br>
<input id="rate" placeholder="Return %"><br>
<input id="years" placeholder="Years"><br>

<button onclick="calc()">Calculate</button>
<h2 id="res"></h2>

<script>
function calc(){
let FV=goal.value;
let r=rate.value/100;
let t=years.value;

let PV = FV / Math.pow(1+r,t);
res.innerText="You need ₹"+Math.round(PV);
}
</script>
